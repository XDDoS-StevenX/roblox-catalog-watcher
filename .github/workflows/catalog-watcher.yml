name: Catalog Watcher Tick

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: catalog-watcher-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run single tick
        run: node index.js
        env:
          RUN_ONCE: "true"
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
          UNIVERSE_ID: ${{ secrets.UNIVERSE_ID }}
          MESSAGING_TOPIC: ${{ secrets.MESSAGING_TOPIC }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ROLE_ID: ${{ secrets.DISCORD_ROLE_ID }}
          # NOTA: usa el nombre legado CATALOG_QUERY (ya existente en los
          # secrets de este repo desde antes) en vez de
          # CATALOG_QUERY_ACCESSORIES. El bot igual lo soporta como
          # fallback (ver linea 18 de index.js). IMPORTANTE: el VALOR de
          # este secret debe tener el fix de includeNotForSale=true
          # aplicado -- verificar que coincida con el valor actual en
          # Render antes de confiar en este workflow.
          CATALOG_QUERY: ${{ secrets.CATALOG_QUERY }}
          CATALOG_QUERY_BUNDLES: ${{ secrets.CATALOG_QUERY_BUNDLES }}
          MAX_PAGES: ${{ secrets.MAX_PAGES }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
