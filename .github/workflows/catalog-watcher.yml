name: Catalog Watcher Tick

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: catalog-watcher-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run single tick
        run: node index.js
        env:
          RUN_ONCE: "true"
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
          UNIVERSE_ID: ${{ secrets.UNIVERSE_ID }}
          MESSAGING_TOPIC: ${{ secrets.MESSAGING_TOPIC }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ROLE_ID: ${{ secrets.DISCORD_ROLE_ID }}
          CATALOG_QUERY_ACCESSORIES: ${{ secrets.CATALOG_QUERY_ACCESSORIES }}
          CATALOG_QUERY_BUNDLES: ${{ secrets.CATALOG_QUERY_BUNDLES }}
          MAX_PAGES: "5"
          FEATURED_MIN_PRICE: "1000"
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
