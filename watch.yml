name: Roblox Catalog Watch

on:
  schedule:
    # cada 15 minutos. GitHub no garantiza precision exacta en horas pico,
    # a veces se retrasa unos minutos, es normal.
    - cron: '*/5 * * * *'
  workflow_dispatch: {} # permite correrlo manualmente desde la pestana Actions

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install

      - name: Correr el watcher (un solo ciclo)
        env:
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
          UNIVERSE_ID: ${{ secrets.UNIVERSE_ID }}
          MESSAGING_TOPIC: ${{ secrets.MESSAGING_TOPIC }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ROLE_ID: ${{ secrets.DISCORD_ROLE_ID }}
          CATALOG_QUERY: ${{ secrets.CATALOG_QUERY }}
          CATALOG_QUERY_ACCESSORIES: ${{ secrets.CATALOG_QUERY_ACCESSORIES }}
          CATALOG_QUERY_BUNDLES: ${{ secrets.CATALOG_QUERY_BUNDLES }}
          MAX_PAGES: ${{ secrets.MAX_PAGES }}
          FEATURED_MIN_PRICE: ${{ secrets.FEATURED_MIN_PRICE }}
          RUN_ONCE: "true"
        run: npm start

      - name: Guardar el estado actualizado (state.json)
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "catalog-watcher-bot"
            git config user.email "actions@users.noreply.github.com"
            git add state.json
            git commit -m "chore: actualizar estado del catalogo [skip ci]"
            git push
          else
            echo "Sin cambios en state.json"
          fi
